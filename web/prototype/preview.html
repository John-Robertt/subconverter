<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>subconverter · 原型直渲</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    html, body, #root { margin: 0; padding: 0; height: 100%; background: #f8fafc; }
    @keyframes b-spin { to { transform: rotate(360deg); } }
    @keyframes b-indeterminate {
      0% { left: -40%; }
      100% { left: 100%; }
    }
    @keyframes b-pulse {
      0%, 100% { box-shadow: 0 0 0 4px rgba(239,68,68,0.1); }
      50% { box-shadow: 0 0 0 8px rgba(239,68,68,0.2); }
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="mock-data.jsx"></script>
  <script type="text/babel" src="mock-data-extra.jsx"></script>
  <script type="text/babel" src="direction-b.jsx"></script>
  <script type="text/babel" src="screens-config.jsx"></script>
  <script type="text/babel" src="screens-runtime.jsx"></script>
  <script type="text/babel" src="demos-feedback.jsx"></script>
  <script type="text/babel" src="demos-modal.jsx"></script>
  <script type="text/babel" src="screen-login.jsx"></script>
  <script type="text/babel">
    function Picker() {
      const params = new URLSearchParams(location.search);
      const screen = params.get('screen') || 'sources';
      const map = {
        sources: window.SourcesB,
        filters: window.FiltersB,
        groups: window.GroupsB,
        routing: window.RoutingB,
        rulesets: window.RulesetsB,
        rules: window.RulesB,
        other: window.OtherB,
        validate: window.ValidateB,
        nodes: window.NodePreviewB,
        grouppreview: window.GroupPreviewB,
        generate: window.GenerateB,
        health: window.HealthB,
        login: window.LoginScreen,
      };
      const Comp = map[screen] || window.SourcesB;
      const isLogin = screen === 'login';
      const props = isLogin
        ? { dark: false, accent: '#6366f1', state: 'idle' }
        : { dark: false, accent: '#6366f1', state: 'idle' };
      return <Comp {...props} />;
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Picker />);
  </script>
</body>
</html>
