version: 2

project_name: subconverter

builds:
  - id: subconverter
    main: ./cmd/subconverter
    binary: subconverter
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}

archives:
  - id: bundles
    ids:
      - subconverter
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - src: configs/base_config.yaml
      - src: configs/base_clash.yaml
      - src: configs/base_surge.conf

checksum:
  name_template: checksums.txt

release:
  draft: false
  prerelease: auto

changelog:
  disable: true
