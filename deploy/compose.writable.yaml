services:
  api:
    image: ghcr.io/john-robertt/subconverter:latest
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      SUBCONVERTER_LISTEN: ":8080"
      SUBCONVERTER_TOKEN: "${SUBCONVERTER_TOKEN:-change-this-generate-token}"
      SUBCONVERTER_AUTH_STATE: "/auth/auth.json"
      SUBCONVERTER_SETUP_TOKEN: "${SUBCONVERTER_SETUP_TOKEN:-change-this-bootstrap-token}"
    volumes:
      - ../config:/config
      - ../auth:/auth
    expose:
      - "8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/subconverter", "-healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 20

  web:
    image: ghcr.io/john-robertt/subconverter-web:latest
    build:
      context: ../web
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"
    restart: unless-stopped
